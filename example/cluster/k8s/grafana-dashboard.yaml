apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: ego-example
data:
  ego-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Commands Processed (rate/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "spanNulls": false,
                "drawStyle": "line",
                "pointSize": 5
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(ego_commands_total[1m])",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Command Duration (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "drawStyle": "line"
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(ego_commands_duration_bucket[1m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, rate(ego_commands_duration_bucket[1m]))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(ego_commands_duration_bucket[1m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Events Persisted (rate/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "drawStyle": "line"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(ego_events_persisted_total[1m])",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Projection Events Processed (rate/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "drawStyle": "line"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(ego_projection_events_processed_total[1m])",
              "legendFormat": "{{projection_name}} / shard {{shard}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Active Entities",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(ego_entities_active)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Active Projections",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(ego_projections_active)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Commands Total",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(ego_commands_total)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Events Persisted Total",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "purple", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(ego_events_persisted_total)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Projection Lag (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "drawStyle": "line",
                "thresholdsStyle": { "mode": "area" }
              },
              "unit": "ms",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5000 },
                  { "color": "red", "value": 30000 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "ego_projection_lag_ms",
              "legendFormat": "{{projection_name}} / shard {{shard}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Projection Events Behind",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "drawStyle": "line",
                "thresholdsStyle": { "mode": "area" }
              },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 1000 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "ego_projection_events_behind",
              "legendFormat": "{{projection_name}} / shard {{shard}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-15m", "to": "now" },
      "title": "eGo Cluster",
      "uid": "ego-cluster-dashboard"
    }
