apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ego-example
data:
  init.sql: |
    -- events_store (from resources/eventstore_postgres.sql)
    CREATE TABLE IF NOT EXISTS events_store
    (
        persistence_id    VARCHAR(255)          NOT NULL,
        sequence_number   BIGINT                NOT NULL,
        is_deleted        BOOLEAN DEFAULT FALSE NOT NULL,
        event_payload     BYTEA                 NOT NULL,
        event_manifest    VARCHAR(255)          NOT NULL,
        timestamp         BIGINT                NOT NULL,
        shard_number      BIGINT                NOT NULL,
        encryption_key_id VARCHAR(255) DEFAULT '' NOT NULL,
        is_encrypted      BOOLEAN DEFAULT FALSE NOT NULL,
        PRIMARY KEY (persistence_id, sequence_number)
    );
    CREATE INDEX IF NOT EXISTS idx_events_store_persistence_id ON events_store(persistence_id);
    CREATE INDEX IF NOT EXISTS idx_events_store_seqnumber ON events_store(sequence_number);
    CREATE INDEX IF NOT EXISTS idx_events_store_timestamp ON events_store(timestamp);
    CREATE INDEX IF NOT EXISTS idx_events_store_shard ON events_store(shard_number);

    -- offsets_store (from resources/offsetstore_postgres.sql)
    CREATE TABLE IF NOT EXISTS offsets_store
    (
        projection_name VARCHAR(255) NOT NULL,
        shard_number    BIGINT       NOT NULL,
        current_offset  BIGINT       NOT NULL,
        timestamp       BIGINT       NOT NULL,
        PRIMARY KEY (projection_name, shard_number)
    );
    CREATE INDEX IF NOT EXISTS idx_offsets_store_name ON offsets_store(projection_name);
    CREATE INDEX IF NOT EXISTS idx_offsets_store_shard ON offsets_store(shard_number);

    -- account_balances (projection read table)
    CREATE TABLE IF NOT EXISTS account_balances
    (
        account_id VARCHAR(255) PRIMARY KEY,
        balance    DOUBLE PRECISION NOT NULL DEFAULT 0,
        updated_at BIGINT           NOT NULL DEFAULT 0
    );
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ego-example
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ego-example
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_DB
              value: ego
            - name: POSTGRES_USER
              value: ego
            - name: POSTGRES_PASSWORD
              value: ego_secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ego"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
