apiVersion: v1
kind: ServiceAccount
metadata:
  name: ego-cluster
  namespace: ego-example
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ego-cluster
  namespace: ego-example
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ego-cluster
  namespace: ego-example
subjects:
  - kind: ServiceAccount
    name: ego-cluster
    namespace: ego-example
roleRef:
  kind: Role
  name: ego-cluster
  apiGroup: rbac.authorization.k8s.io
