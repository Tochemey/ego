syntax = "proto3";

package samplepb;

option go_package = "github.com/tochemey/goakt/examples/protos/samplepb;samplepb";

message Ping {
  string id = 1;
}

message Pong {
  string reply = 2;
}

message Account {
  string account_id = 1;
  double account_balance = 2;
}

message CreateAccount {
  string account_id = 1;
  double account_balance = 2;
}

message CreditAccount {
  string account_id = 1;
  double balance = 2;
}

message AccountCreated {
  string account_id = 1;
  double account_balance = 2;
}

message AccountCredited {
  string account_id = 1;
  double account_balance = 2;
}

// DebitAccount is a command to debit a given amount from an account.
message DebitAccount {
  string account_id = 1;
  double balance = 2;
}

// AccountDebited is an event emitted when an account is debited.
message AccountDebited {
  string account_id = 1;
  double account_balance = 2;
}

// TransferState is the saga's internal state tracking a fund transfer.
message TransferState {
  string transfer_id = 1;
  string source_account_id = 2;
  string destination_account_id = 3;
  double amount = 4;
  bool source_debited = 5;
  bool destination_credited = 6;
}

// TransferStarted is a saga event recorded when a transfer begins.
message TransferStarted {
  string transfer_id = 1;
  string source_account_id = 2;
  string destination_account_id = 3;
  double amount = 4;
}

// SourceDebited is a saga event recorded when the source account is debited.
message SourceDebited {
  string source_account_id = 1;
  double amount = 2;
}

// DestinationCredited is a saga event recorded when the destination account is credited.
message DestinationCredited {
  string destination_account_id = 1;
  double amount = 2;
}
